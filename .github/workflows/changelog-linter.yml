name: changelog-linter

on:
  pull_request:

permissions:
  contents: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changelog update
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: bash .github/scripts/lint-changelog.sh
