name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - uses: ko-build/setup-ko@v0.8

      - name: Run tests
        run: go test ./...

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image with ko
        env:
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          REPO_LC="$(echo "$REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          export KO_DOCKER_REPO="ghcr.io/${REPO_LC}"
          ko build --platform=all --bare --sbom=none --tags "${TAG},latest" ./cmd/vnc-recorder

      - name: Build binaries for release
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/vnc-recorder-linux-amd64 ./cmd/vnc-recorder
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/vnc-recorder-linux-arm64 ./cmd/vnc-recorder
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/vnc-recorder-darwin-amd64 ./cmd/vnc-recorder
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/vnc-recorder-darwin-arm64 ./cmd/vnc-recorder
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/vnc-recorder-windows-amd64.exe ./cmd/vnc-recorder

      - name: Generate changelog for release
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PREV_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -v "^${TAG}$" | head -n1 || true)"
          {
            echo "## Container Image"
            echo
            echo "\`ghcr.io/${{ github.repository }}:${TAG}\`"
            echo
            echo "## Changelog"
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since ${PREV_TAG}:"
              echo
              git log --pretty='- %s (%h)' "${PREV_TAG}..${TAG}"
            else
              echo "Initial release changes:"
              echo
              git log --pretty='- %s (%h)' "${TAG}"
            fi
          } > dist/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body_path: dist/release-notes.md
